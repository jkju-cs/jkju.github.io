# ── Korea University (M.S. Research) ─────────────────────────────

- title: "Reward Uncertainty & Information Entropy in Visual Attention (M.S. Research)"
  organization: "Korea University, School of Psychology"
  role: "First Author — Experiment Design, Data Collection, Statistical Analysis"
  period: "Mar 2021 – Feb 2023"
  status: Completed
  description: >
    Investigated whether information entropy or reward variance is the primary driver
    of value-driven attentional capture (VDAC). Conducted 4 behavioral experiments
    (N=160+) using visual search paradigms, systematically decoupling entropy and
    variance. Found that information entropy consistently increased attentional
    interference toward distractors, while variance alone did not. Published in
    JEP: Learning, Memory, and Cognition (2023). Presented at Psychonomic Society.
  tags:
    - Cognitive Psychology
    - Visual Attention
    - Experimental Psychology
    - PsychoPy / R
    - VDAC
  links:
    paper: "https://psycnet.apa.org/buy/2023-11497-001"

- title: "HUD Visual Complexity & Attentional Allocation in Driving"
  organization: "Korea University, School of Psychology"
  role: "Co-first Author — Experiment Design, Dual-Task Setup, Data Analysis"
  period: "Mar 2021 – Aug 2021"
  status: Completed
  description: >
    Examined how varying levels of HUD visual complexity (5 levels) affect drivers'
    attentional distribution between near and far visual domains. Used a dual-task
    paradigm (speed maintenance + peripheral detection) with 62 participants in a
    driving simulator. Found that higher HUD complexity significantly impaired
    far-domain detection accuracy, revealing attentional bias toward the central
    visual field. Provided evidence-based HUD design guidelines. Published in
    Human Factors (2024). Presented at AHFE Conference.
  tags:
    - HCI
    - Automotive Safety
    - Eye-tracking
    - Cognitive Psychology
    - Driving Simulator
  links:
    paper: "https://journals.sagepub.com/doi/full/10.1177/00187208231181496"

- title: "Computational Modeling of Value-Driven Attentional Capture"
  organization: "Korea University, School of Psychology"
  role: "Co-Author — Model Implementation, Parameter Fitting, Performance Analysis"
  period: "Mar 2020 – Aug 2020"
  status: Completed
  description: >
    Implemented and compared four associative learning models (Rescorla-Wagner,
    Mackintosh, SPH, Esber-Haselgrove) to explain value-driven attentional capture.
    Used BIC for model comparison. SPH-V and EH-α models best captured phenomena
    including uncertainty, switching inertia, and extinction resistance. Established
    a model-based foundation for understanding attention mechanisms applicable to
    adaptive interface design. Published in Psychonomic Bulletin & Review (2023).
  tags:
    - Computational Modeling
    - Associative Learning
    - MATLAB / Python
    - Cognitive Science
    - VDAC
  links:
    paper: "https://link.springer.com/article/10.3758/s13423-023-02296-0"
