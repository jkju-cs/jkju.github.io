# Bio paragraphs (supports HTML)
bio:
  - >
    I am a Research Engineer &amp; Data Scientist at Hyundai Motor Group,
    where I work on large-scale user behavior analysis, user modeling (ML),
    and human-AI interaction design for in-vehicle infotainment (IVI) systems.
    I hold an M.S. in Behavioral &amp; Cognitive Neuroscience from
    <a href="https://psychology.korea.ac.kr" target="_blank" rel="noopener noreferrer" class="text-link">Korea University, School of Psychology</a>.
  - >
    My work sits at the intersection of <strong>Cognitive Science</strong>,
    <strong>Human-Computer Interaction</strong>, and <strong>Artificial Intelligence</strong>.
    I study how information presentation shapes human cognition, judgment, and action —
    and build intelligent systems that align with how people actually perceive and process information.

