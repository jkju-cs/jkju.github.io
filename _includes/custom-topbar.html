<!-- Top Navigation Bar -->
<nav class="site-topbar" role="navigation" aria-label="Main navigation">
  <div class="topbar-inner">

    <!-- Nav Links -->
    <div class="topbar-nav" id="topbar-nav">
      <a href="{{ '/' | relative_url }}"
         class="{% if page.url == '/' %}active{% endif %}">Home</a>
      <a href="{{ '/publications' | relative_url }}"
         class="{% if page.url contains '/publications' %}active{% endif %}">Publications</a>
      <a href="{{ '/projects' | relative_url }}"
         class="{% if page.url contains '/projects' %}active{% endif %}">Projects</a>
      <a href="{{ '/blog' | relative_url }}"
         class="{% if page.url contains '/blog' or page.url contains '/posts' or page.url contains '/categories' or page.url contains '/tags' %}active{% endif %}">Blog</a>
      <a href="{{ '/analytics' | relative_url }}"
         class="{% if page.url contains '/analytics' %}active{% endif %}">Look who's here</a>
      <a href="{{ '/contact' | relative_url }}"
         class="{% if page.url contains '/contact' %}active{% endif %}">Contact</a>
    </div>

    <!-- Right actions -->
    <div class="topbar-actions">

      <!-- Dark mode toggle -->
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
        <!-- Moon icon (shown in light mode) -->
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
             viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <!-- Sun icon (shown in dark mode) -->
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
             viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>

      <!-- CV Download -->
      <a href="{{ site.data.profile.cv_pdf }}" target="_blank" rel="noopener noreferrer" class="btn-cv">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
             viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download CV
      </a>

      <!-- Mobile hamburger -->
      <button class="topbar-mobile-toggle" id="mobile-toggle" aria-label="Toggle mobile menu">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
             viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

    </div>
  </div>
</nav>

<!-- Dark mode + mobile nav JS -->
<script>
  // Dark mode init (before paint)
  (function() {
    var stored = localStorage.getItem('mode');
    var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (stored === 'dark' || (!stored && prefersDark)) {
      document.documentElement.setAttribute('data-mode', 'dark');
    }
  })();

  // Toggle on button click
  document.getElementById('theme-toggle').addEventListener('click', function() {
    var html = document.documentElement;
    var isDark = html.getAttribute('data-mode') === 'dark';
    if (isDark) {
      html.removeAttribute('data-mode');
      localStorage.setItem('mode', 'light');
    } else {
      html.setAttribute('data-mode', 'dark');
      localStorage.setItem('mode', 'dark');
    }
  });

  // Mobile nav toggle
  document.getElementById('mobile-toggle').addEventListener('click', function() {
    var nav = document.getElementById('topbar-nav');
    nav.classList.toggle('open');
  });
</script>
