<!-- Top Navigation Bar -->
<nav class="site-topbar" role="navigation" aria-label="Main navigation">
  <div class="topbar-inner">

    <!-- Brand -->
    <a href="{{ '/' | relative_url }}" class="topbar-brand">{{ site.data.profile.name }}</a>

    <!-- Nav Links -->
    <div class="topbar-nav" id="topbar-nav">
      <a href="{{ '/' | relative_url }}"
         class="{% if page.url == '/' %}active{% endif %}">Home</a>
      <a href="{{ '/publications' | relative_url }}"
         class="{% if page.url contains '/publications' %}active{% endif %}">Publications</a>
      <a href="{{ '/projects' | relative_url }}"
         class="{% if page.url contains '/projects' %}active{% endif %}">Projects</a>
      <a href="{{ '/blog' | relative_url }}"
         class="{% if page.url contains '/blog' or page.url contains '/posts' or page.url contains '/categories' or page.url contains '/tags' %}active{% endif %}">Blog</a>
      <a href="{{ '/analytics' | relative_url }}"
         class="{% if page.url contains '/analytics' %}active{% endif %}">Look who's here</a>
      <a href="{{ '/cv' | relative_url }}"
         class="{% if page.url contains '/cv' %}active{% endif %}">CV</a>
      <a href="{{ '/contact' | relative_url }}"
         class="{% if page.url contains '/contact' %}active{% endif %}">Contact</a>
    </div>

    <!-- Right actions -->
    <div class="topbar-actions">

      <!-- Mobile hamburger -->
      <button class="topbar-mobile-toggle" id="mobile-toggle" aria-label="Toggle mobile menu">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
             viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

    </div>
  </div>
</nav>

<!-- Mobile nav JS -->
<script>
  document.getElementById('mobile-toggle').addEventListener('click', function() {
    var nav = document.getElementById('topbar-nav');
    nav.classList.toggle('open');
  });
</script>
